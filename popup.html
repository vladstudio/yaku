<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 260px;
  font: 13px/1.4 -apple-system, system-ui, sans-serif;
  padding: 12px;
  color: #1a1a1a;
}
.row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
label { font-size: 11px; color: #666; min-width: 34px; }
input[type="text"] {
  flex: 1;
  padding: 4px 6px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 12px;
  background: #fff;
  min-width: 0;
}
button {
  width: 100%;
  padding: 7px;
  border: none;
  border-radius: 5px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: #fff;
  background: #F86C26;
}
button:hover { background: #d9612a; }
button.cancel { background: #888; }
button.cancel:hover { background: #666; }
button:disabled { opacity: 0.5; cursor: default; }
.status {
  text-align: center;
  font-size: 12px;
  color: #555;
  margin-top: 8px;
}
.status a {
  color: #F86C26;
  cursor: pointer;
  text-decoration: underline;
}
.progress-bar {
  height: 3px;
  background: #eee;
  border-radius: 2px;
  margin-bottom: 10px;
  overflow: hidden;
  display: none;
}
.progress-bar .fill {
  height: 100%;
  background: #F86C26;
  width: 0%;
  transition: width 0.3s;
}
.error { color: #c33; font-size: 12px; text-align: center; margin-top: 6px; }
.settings {
  margin-top: 10px;
  border-top: 1px solid #eee;
  padding-top: 8px;
}
.settings-toggle {
  width: auto;
  background: none;
  color: #999;
  font-size: 11px;
  padding: 2px 0;
  font-weight: 400;
}
.settings-toggle:hover { background: none; color: #666; }
*:focus { outline: 2px solid rgba(248, 108, 38, 0.2); outline-offset: 2px; }
.api-key-row {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}
.api-key-row input {
  flex: 1;
  padding: 4px 6px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 11px;
  font-family: monospace;
}
.api-key-row button {
  width: auto;
  padding: 4px 10px;
  font-size: 11px;
}
.mode-toggle { display: flex; gap: 1px; margin-bottom: 10px; background: #eee; border-radius: 5px; }
.mode-toggle button { flex: 1; padding: 4px; border: none; background: #eee; font-size: 11px; cursor: pointer; color: #666; border-radius: 5px; }
.mode-toggle button.active { background: #F86C26; color: #fff; }
.mode-toggle button:disabled { opacity: 0.35; cursor: default; }
[hidden] { display: none !important; }
.favs { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
.favs span { font-size: 11px; padding: 2px 6px; border-radius: 10px; border: 1px solid #ddd; cursor: pointer; white-space: nowrap; color: #555; }
.favs span:hover { border-color: #F86C26; color: #F86C26; }
.favs span b { display: none; font-weight: normal; margin-left: 2px; font-size: 9px; }
.favs span:hover b { display: inline; }
.favs span.active { background: #F86C26; color: #fff; border-color: #F86C26; }
.favs span.add { border-style: dashed; color: #aaa; }
</style>
</head>
<body>
  <div id="controls">
    <div class="row">
      <label>From</label>
      <input type="text" id="from" list="fromList" placeholder="Auto-detect">
      <datalist id="fromList"></datalist>
    </div>
    <div class="row">
      <label>To</label>
      <input type="text" id="to" list="toList" placeholder="Language">
      <datalist id="toList"></datalist>
    </div>
    <div class="favs" id="favs"></div>
    <div class="mode-toggle" id="modeToggle">
      <button class="active" data-mode="page">Whole page</button>
      <button data-mode="selection" disabled>Selection</button>
    </div>
    <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
    <button id="btn">Translate</button>
  </div>
  <button class="cancel" id="cancelBtn" hidden>Cancel</button>
  <div class="status" id="status"></div>
  <div class="settings">
    <button class="settings-toggle" id="settingsToggle">API Key</button>
    <a href="https://yaku.vlad.studio/" target="_blank" class="settings-toggle" style="float:right">yaku</a>
    <div id="settingsPanel" hidden>
      <div class="api-key-row">
        <input type="password" id="apiKeyInput" placeholder="Google Cloud API key">
        <button id="apiKeySave">Save</button>
      </div>
      <div style="font-size:10px;color:#999;margin-top:4px">
        <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:#999">Get a key</a> &middot; <a href="https://console.developers.google.com/apis/api/translate.googleapis.com/overview" target="_blank" style="color:#999">Enable Cloud Translation API</a>
      </div>
    </div>
  </div>
<script src="popup.js"></script>
</body>
</html>

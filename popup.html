<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 260px;
  font: 13px/1.4 -apple-system, system-ui, sans-serif;
  padding: 12px;
  color: #1a1a1a;
}
.row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
label { font-size: 11px; color: #666; min-width: 34px; }
select {
  flex: 1;
  padding: 4px 6px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 12px;
  background: #fff;
}
button {
  width: 100%;
  padding: 7px;
  border: none;
  border-radius: 5px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: #fff;
  background: #EE6F30;
}
button:hover { background: #d9612a; }
button.cancel { background: #888; }
button.cancel:hover { background: #666; }
button:disabled { opacity: 0.5; cursor: default; }
.status {
  text-align: center;
  font-size: 12px;
  color: #555;
  margin-top: 8px;
}
.status a {
  color: #EE6F30;
  cursor: pointer;
  text-decoration: underline;
}
.progress-bar {
  height: 3px;
  background: #eee;
  border-radius: 2px;
  margin-bottom: 10px;
  overflow: hidden;
  display: none;
}
.progress-bar .fill {
  height: 100%;
  background: #EE6F30;
  width: 0%;
  transition: width 0.3s;
}
.error { color: #c33; font-size: 12px; text-align: center; margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <label>From</label>
    <select id="from">
      <option value="auto">Auto-detect</option>
    </select>
  </div>
  <div class="row">
    <label>To</label>
    <select id="to"></select>
  </div>
  <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
  <button id="btn">Translate</button>
  <div class="status" id="status"></div>
<script src="popup.js"></script>
</body>
</html>
